name: Daily Fetch

on:
  schedule:
    # UTC 0:00 and 12:00 = Beijing 8:00 and 20:00
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache seen DB
        uses: actions/cache@v4
        with:
          path: ~/.simon_daily.db
          key: simon-daily-db-${{ github.run_id }}
          restore-keys: simon-daily-db-

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch latest posts
        run: python fetch.py --no-translate

      - name: Commit new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "No new posts to commit"
          else
            git commit -m "Auto-fetch: new posts from Simon Willison"
            git push
          fi
