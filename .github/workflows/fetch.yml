name: Daily Fetch

on:
  schedule:
    # UTC 0:00 and 12:00 = Beijing 8:00 and 20:00
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Cache seen DB
        uses: actions/cache@v4
        with:
          path: ~/.simon_daily.db
          key: simon-daily-db-${{ github.run_id }}
          restore-keys: simon-daily-db-

      - name: Cache fabric patterns
        uses: actions/cache@v4
        with:
          path: ~/.config/fabric/patterns
          key: fabric-patterns-${{ github.run_id }}
          restore-keys: fabric-patterns-

      - name: Install Python deps
        run: pip install feedparser

      - name: Install fabric
        run: |
          go install github.com/danielmiessler/fabric@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Configure fabric
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p ~/.config/fabric
          cat > ~/.config/fabric/.env <<EOF
          DEFAULT_VENDOR=OpenAI
          DEFAULT_MODEL=gpt-4o-mini
          OPENAI_API_KEY=${OPENAI_API_KEY}
          PATTERNS_LOADER_GIT_REPO_URL=https://github.com/danielmiessler/fabric.git
          PATTERNS_LOADER_GIT_REPO_PATTERNS_FOLDER=data/patterns
          EOF
          fabric -U

      - name: Fetch and translate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python fetch.py

      - name: Commit new posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "No new posts to commit"
          else
            git commit -m "Auto-fetch: new posts from Simon Willison"
            git push
          fi
